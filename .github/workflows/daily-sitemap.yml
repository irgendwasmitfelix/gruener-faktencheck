name: Daily Sitemap Generation & Article Sync

on:
  schedule:
    # Läuft jeden Sonntag um 00:00 UTC (01:00 MEZ)
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Manuelle Ausführung möglich

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generate Sitemap and Static HTML
        run: |
          echo "📄 Generiere Sitemap und statisches HTML..."
          python scripts/generate_sitemap.py
          python scripts/generate_static_html.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Füge alle generierten Dateien hinzu
          git add public/sitemap.xml
          
          # Commit nur wenn Änderungen vorhanden sind
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-generated: Article Sync + Sitemap (Daily)" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
